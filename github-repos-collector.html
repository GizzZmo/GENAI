<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Repos Collector — Constantine Universe</title>

  <!-- Bootstrap (matches rest of project) -->
  <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="bootstrap/css/cerulean.min.css"  rel="stylesheet">

  <style>
    /* ── Base reset & typography ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #30363d;
      --accent:    #00e5ff;
      --accent2:   #7ee787;
      --warn:      #f0883e;
      --danger:    #ff6b6b;
      --text:      #c9d1d9;
      --text-dim:  #8b949e;
      --font-mono: 'Courier New', Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      margin: 0;
      padding: 0;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; color: #fff; }

    /* ── Top bar ───────────────────────────────────────────────────── */
    .top-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .top-bar .brand {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .top-bar .brand span { color: var(--accent); }
    .top-bar .title {
      font-size: 1rem;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    .collector-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    /* ── Section headings ──────────────────────────────────────────── */
    .section-label {
      font-size: 0.65rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* ── Search form ───────────────────────────────────────────────── */
    .search-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .ctrl-input,
    .ctrl-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color .15s;
    }

    .ctrl-input:focus,
    .ctrl-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,229,255,.15);
    }

    #github-username { min-width: 260px; }

    .btn-collect {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--accent);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 2px;
      padding: 8px 22px;
      text-transform: uppercase;
      transition: background .15s, color .15s;
    }
    .btn-collect:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* ── Controls bar (filter + sort) ──────────────────────────────── */
    .controls-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .controls-bar .ctrl-input { flex: 1; min-width: 200px; }

    .total-count {
      margin-left: auto;
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    /* ── Status line ───────────────────────────────────────────────── */
    .collector-status {
      font-size: 0.75rem;
      letter-spacing: 2px;
      min-height: 20px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .status-info    { color: var(--accent); }
    .status-success { color: var(--accent2); }
    .status-error   { color: var(--danger); }

    /* ── Results grid ──────────────────────────────────────────────── */
    #repo-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .no-results {
      grid-column: 1 / -1;
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 32px 0;
      text-align: center;
      letter-spacing: 1px;
    }
    .error-msg { color: var(--danger); }

    /* ── Repo card ─────────────────────────────────────────────────── */
    .repo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color .15s, box-shadow .15s;
    }
    .repo-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(0,229,255,.08);
    }

    .repo-card-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .repo-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .repo-name svg { flex-shrink: 0; }
    .repo-name:hover { color: #fff; }

    .badge {
      font-size: 0.6rem;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 20px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .public-badge   { border: 1px solid var(--border); color: var(--text-dim); }
    .private-badge  { border: 1px solid var(--warn);   color: var(--warn); }
    .fork-badge     { border: 1px solid #58a6ff;        color: #58a6ff; }
    .archived-badge { border: 1px solid var(--text-dim); color: var(--text-dim); }

    .repo-desc {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      flex: 1;
    }
    .no-desc { color: var(--text-dim); font-style: italic; }

    .repo-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .lang-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .lang-label { color: var(--text); }
    .meta-stat  { white-space: nowrap; }
    .meta-updated { margin-left: auto; white-space: nowrap; }

    .repo-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .topic-tag {
      background: rgba(56,139,253,.15);
      border: 1px solid rgba(56,139,253,.3);
      border-radius: 20px;
      color: #58a6ff;
      font-size: 0.65rem;
      letter-spacing: 1px;
      padding: 2px 8px;
    }

    /* ── Pagination ────────────────────────────────────────────────── */
    #pagination {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-top: 28px;
    }

    .pg-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      min-width: 36px;
      padding: 5px 10px;
      transition: border-color .1s, color .1s;
    }
    .pg-btn:hover:not(:disabled):not(.pg-active) {
      border-color: var(--accent);
      color: var(--accent);
    }
    .pg-active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 700;
    }
    .pg-disabled { opacity: .35; cursor: default; }
    .pg-ellipsis { color: var(--text-dim); padding: 5px 4px; font-size: 0.8rem; }

    /* ── Blinking cursor animation ─────────────────────────────────── */
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor::after {
      content: '█';
      animation: blink 1s step-end infinite;
      color: var(--accent);
      font-size: 0.9em;
      margin-left: 2px;
    }

    /* ── Responsive tweaks ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      #github-username { min-width: 100%; }
      .btn-collect { width: 100%; }
      .total-count { margin-left: 0; }
      #repo-results { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <!-- ── Top bar ─────────────────────────────────────────────────────────── -->
  <nav class="top-bar">
    <div class="brand"><span>//</span> CONSTANTINE UNIVERSE</div>
    <div class="title">GitHub Repos Collector</div>
  </nav>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="collector-wrap">

    <p class="section-label">// The Hidden Network — Repository Scanner</p>

    <!-- Search panel -->
    <section class="search-panel" aria-label="Repository search">
      <form id="collector-form" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label for="github-username">GitHub Username / Org</label>
            <input
              id="github-username"
              class="ctrl-input"
              type="text"
              placeholder="e.g. GizzZmo"
              required
              spellcheck="false"
              aria-label="GitHub username or organisation"
            >
          </div>

          <div class="form-group">
            <label for="repo-type">Type</label>
            <select id="repo-type" class="ctrl-select" aria-label="Repository type filter">
              <option value="all">All</option>
              <option value="owner">Owner</option>
              <option value="member">Member</option>
              <option value="forks">Forks</option>
              <option value="sources">Sources</option>
            </select>
          </div>

          <div class="form-group">
            <label>&nbsp;</label>
            <button type="submit" class="btn-collect">Collect</button>
          </div>
        </div>
      </form>
    </section>

    <!-- Status line -->
    <div id="collector-status" class="collector-status cursor" aria-live="polite"></div>

    <!-- Controls bar -->
    <div class="controls-bar" id="controls-bar">
      <input
        id="filter-repos"
        class="ctrl-input"
        type="search"
        placeholder="// filter by name, description, language…"
        aria-label="Filter repositories"
      >

      <div class="form-group">
        <label for="sort-by" class="section-label" style="margin-bottom:2px">Sort</label>
        <select id="sort-by" class="ctrl-select" aria-label="Sort repositories">
          <option value="stars-desc">Stars ↓</option>
          <option value="stars-asc">Stars ↑</option>
          <option value="forks-desc">Forks ↓</option>
          <option value="forks-asc">Forks ↑</option>
          <option value="updated-desc">Updated ↓</option>
          <option value="updated-asc">Updated ↑</option>
          <option value="name-asc">Name A→Z</option>
          <option value="name-desc">Name Z→A</option>
        </select>
      </div>

      <span id="total-count" class="total-count" aria-live="polite"></span>
    </div>

    <!-- Repo cards -->
    <section id="repo-results" aria-label="Repository results"></section>

    <!-- Pagination -->
    <nav id="pagination" aria-label="Results pagination"></nav>

  </main>

  <script src="static/js/github-repos-collector.js"></script>
</body>
</html>
