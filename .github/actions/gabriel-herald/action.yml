# ─────────────────────────────────────────────────────────────────────────────
# Composite Action: gabriel-herald
# Posts a formatted announcement or summary comment to a PR or issue.
# Used by Gabriel's Chronicle job and by external callers.
# ─────────────────────────────────────────────────────────────────────────────
name: "📯 Gabriel's Herald — Announcement Poster"
description: "Posts or updates a formatted Gabriel-branded comment on a PR or issue."

inputs:
  issue_number:
    description: "PR or issue number to comment on"
    required: true
  message:
    description: "Message body (Markdown)"
    required: true
  tag:
    description: "Unique tag to identify and update existing comment (prevents duplicates)"
    required: false
    default: "gabriel-herald"
  github_token:
    description: "GitHub token"
    required: true

outputs:
  comment_id:
    description: "ID of the created or updated comment"
    value: ${{ steps.post.outputs.comment_id }}

runs:
  using: "composite"
  steps:
    - name: "📯 Post or update Gabriel comment"
      id: post
      uses: actions/github-script@v7
      env:
        INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
        INPUT_MESSAGE:      ${{ inputs.message }}
        INPUT_TAG:          ${{ inputs.tag }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const issueNumber = parseInt(process.env.INPUT_ISSUE_NUMBER, 10);
          const tag         = process.env.INPUT_TAG;
          const body        = process.env.INPUT_MESSAGE +
            `\n\n---\n<sub>📯 Gabriel Agent · tag:${tag}</sub>`;

          const { data: comments } = await github.rest.issues.listComments({
            owner:        context.repo.owner,
            repo:         context.repo.repo,
            issue_number: issueNumber,
            per_page:     100,
          });

          const existing = comments.find(
            c => c.user.type === 'Bot' && c.body.includes(`tag:${tag}`)
          );

          let commentId;
          if (existing) {
            const { data: updated } = await github.rest.issues.updateComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              comment_id: existing.id,
              body,
            });
            commentId = updated.id;
          } else {
            const { data: created } = await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              body,
            });
            commentId = created.id;
          }

          core.setOutput('comment_id', String(commentId));
